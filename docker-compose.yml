services:
  app:
    container_name: fitness-221-app
    image: smt197/fitness-221:latest
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    networks:
      - app-network
    environment:
      APP_NAME: 'fitness-221'
      APP_ENV: '${APP_ENV:-production}'
      NODE_ENV: 'production'
      PORT: '5000'
      DATABASE_URL: 'postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-Serigne197}@db:5432/${POSTGRES_DB:-fitness221}?schema=public'
      JWT_SECRET: '${JWT_SECRET:-supersecretfitness2026}'
      CLOUDINARY_CLOUD_NAME: '${CLOUDINARY_CLOUD_NAME}'
      CLOUDINARY_API_KEY: '${CLOUDINARY_API_KEY}'
      CLOUDINARY_API_SECRET: '${CLOUDINARY_API_SECRET}'
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: fitness-221-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Serigne197}
      POSTGRES_DB: ${POSTGRES_DB:-fitness221}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-fitness221} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
